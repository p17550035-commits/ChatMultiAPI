name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11.9'

    - name: Add Python 3.11 to PATH
      run: |
        echo "PATH=/opt/hostedtoolcache/Python/3.11.9/x64/bin:$PATH" >> $GITHUB_ENV
        echo "PATH=/opt/hostedtoolcache/Python/3.11.9/x86_64/bin:$PATH" >> $GITHUB_ENV

    - name: Create Python 3.11 symlink
      run: |
        ln -s /opt/hostedtoolcache/Python/3.11.9/x64/bin/python3.11 /usr/local/bin/3.11 || true
        ln -s /opt/hostedtoolcache/Python/3.11.9/x86_64/bin/python3.11 /usr/local/bin/3.11 || true

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew

    # ⭐ ADDED: Decode keystore before building
    - name: Decode keystore
      working-directory: android
      run: |
        echo "$KEYSTORE_B64" | base64 --decode > my-release-key.jks

    - name: Build APK
      working-directory: android
      run: ./gradlew assembleDebug

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/*.apk
